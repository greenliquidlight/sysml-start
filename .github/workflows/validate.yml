name: Validate Model

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  validate:
    name: Validate SysML2 Model Files
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make validate script executable
        run: chmod +x scripts/validate-model

      - name: Run model validation
        run: scripts/validate-model

