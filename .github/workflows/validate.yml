name: Validate Model

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  validate:
    name: Validate SysML2 Model Files
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install GraphViz
        run: sudo apt-get install -y graphviz

      - name: Make scripts executable
        run: chmod +x scripts/setup-tools scripts/validate-model

      - name: Download OMG kernel and compile SysMLRender
        run: scripts/setup-tools

      - name: Run model validation
        run: scripts/validate-model
