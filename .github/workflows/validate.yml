name: Validate Model

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Opt into Node.js 24 for all Actions now, ahead of the June 2026 forced migration.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
# Remove this block once Node.js 24 becomes the default runner.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate SysML2 Model Files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Skip Sphinx/Python deps — not needed for model validation.
      SETUP_DOCS_DEPS: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install GraphViz
        run: sudo apt-get install -y graphviz

      - name: Make scripts executable
        run: chmod +x scripts/setup-tools scripts/validate-model

      - name: Download OMG kernel and compile SysMLRender
        run: scripts/setup-tools

      - name: Run model validation
        run: scripts/validate-model
