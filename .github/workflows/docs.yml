name: Build Docs

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Render Diagrams and Build Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install GraphViz
        run: sudo apt-get install -y graphviz

      - name: Make scripts executable
        run: chmod +x scripts/setup-tools scripts/render-diagrams scripts/build-docs

      - name: Download OMG kernel and compile SysMLRender
        run: scripts/setup-tools

      - name: Render diagrams
        run: scripts/render-diagrams

      - name: Build docs
        run: scripts/build-docs

      - name: Upload generated diagrams
        uses: actions/upload-artifact@v4
        with:
          name: generated-diagrams
          path: generated/diagrams/
          if-no-files-found: warn

      - name: Upload generated docs
        uses: actions/upload-artifact@v4
        with:
          name: generated-docs
          path: generated/docs/
          if-no-files-found: warn
