name: Build Docs

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Opt into Node.js 24 for all Actions now, ahead of the June 2026 forced migration.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
# Remove this block once Node.js 24 becomes the default runner.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Render Diagrams and Build Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install GraphViz
        run: sudo apt-get install -y graphviz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Make scripts executable
        run: chmod +x scripts/setup-tools scripts/render-diagrams scripts/build-docs

      - name: Download OMG kernel and compile SysMLRender
        run: scripts/setup-tools

      - name: Render diagrams
        run: scripts/render-diagrams

      - name: Build docs
        run: scripts/build-docs

      - name: Upload generated diagrams
        uses: actions/upload-artifact@v4
        with:
          name: generated-diagrams
          path: generated/diagrams/
          if-no-files-found: warn

      - name: Upload generated docs
        uses: actions/upload-artifact@v4
        with:
          name: generated-docs
          path: generated/docs/
          if-no-files-found: warn

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download generated docs artifact
        uses: actions/download-artifact@v4
        with:
          name: generated-docs
          path: generated/docs/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: generated/docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

